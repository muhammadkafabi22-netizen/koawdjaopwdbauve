<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAUFAA CANTIKKK 3D</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05010a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            perspective: 1000px;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #scene3D {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            z-index: 5;
            pointer-events: none;
        }
        .interface {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            pointer-events: auto;
        }
        .btn-start, .countdown {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            color: #ff3377;
            background: transparent;
            border: 3px solid #ff3377;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 51, 119, 0.4), inset 0 0 15px rgba(255, 51, 119, 0.2);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn-start:hover {
            background: #ff3377;
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 51, 119, 0.8);
            transform: scale(1.05);
        }
        .countdown {
            border-color: #ff33aa;
            color: #ff33aa;
            background: rgba(0,0,0,0.4);
            display: none;
        }
        .main-headline {
            display: none;
            text-align: center;
            color: #fff;
            font-size: 2.5rem;
            text-shadow: 0 0 10px #ff3377, 0 0 20px #ff33aa;
            opacity: 1;
            transition: opacity 1.5s ease-in-out;
            padding: 0 20px;
        }
        .messages-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-style: preserve-3d;
            pointer-events: auto;
        }
        .msg-bubble {
            position: absolute;
            background: rgba(255, 20, 147, 0.12);
            border: 2px solid rgba(255, 51, 119, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.9rem;
            white-space: nowrap;
            box-shadow: 0 0 10px rgba(255, 51, 119, 0.2);
            animation: floatUp 14s linear infinite;
        }
        .photo-bubble {
            position: absolute;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid rgba(255, 51, 119, 0.8);
            object-fit: cover;
            box-shadow: 0 0 15px rgba(255, 51, 119, 0.5);
            animation: floatUp 14s linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(105vh) translateZ(0px); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-15vh) translateZ(200px); opacity: 0; }
        }
        .btn-close {
            display: none;
            position: absolute;
            bottom: 40px;
            z-index: 20;
            padding: 10px 30px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background: rgba(255, 51, 119, 0.6);
            border: 2px solid #ff3377;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 51, 119, 0.5);
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .btn-close:hover {
            background: #ff3377;
            box-shadow: 0 0 20px #ff3377;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>

    <div id="scene3D">
        <div class="messages-container" id="msgContainer"></div>
    </div>

    <div class="interface" id="uiLayer">
        <button class="btn-start" id="startBtn">START</button>
        <div class="countdown" id="timer">3</div>
        <h1 class="main-headline" id="headline">Hallooo<br>Naufaa Cantikkk 💖</h1>
        <button class="btn-close" id="closeBtn">CLOSE</button>
    </div>

    <script>
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const timer = document.getElementById('timer');
        const headline = document.getElementById('headline');
        const msgContainer = document.getElementById('msgContainer');
        const closeBtn = document.getElementById('closeBtn');
        const scene3D = document.getElementById('scene3D');
        const uiLayer = document.getElementById('uiLayer');

        let fireworks = [];
        let particles = [];
        let running = false;
        let spawnInterval;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const ucapanList = [
            "Happy birthday cantikkk, sehat selalu yaaa 🥳",
            "orang terkeren, orang terbest and always my best decision 💍",
            "Loving you never gets old, Nuafaaa kerenn and cantikk ✨",
            "You're my favorite person, sekarang dan selamanya 🥰",
            "Terima kasih sudah ada. You mean everything 🌎",
            "Tetap jadi Naufaa yang ceriaa dan lucuu ituu yahh ❤️",
            "Semoga semua impianmu tercapai satu per satu 🌟",
            "I love you, yesterday, today, and always ♾️",
            "Tidak ada yang ingin aku ubah darimu, kamu keren kamu hebat 💕",
            "Happy birthday yahh🥳🥳🥳"
        ];

        // --- SISTEM PENGAMBILAN FOTO PINTAR ---
        // Mencoba ekstensi .jpg dan .jpeg secara bergantian
        function getSmartPhotoUrl(index) {
            const num = index + 1;
            // Gunakan file yang namanya FOTO (SPASI) Angka (misal: FOTO 1)
            const baseName = `FOTO ${num}`;
            return Math.random() > 0.5 ? encodeURIComponent(`${baseName}.jpg`) : encodeURIComponent(`${baseName}.jpeg`);
        }

        let targetX = 0, targetY = 0;
        let currentX = 0, currentY = 0;

        function handleMove(clientX, clientY) {
            const ax = (window.innerWidth / 2 - clientX) / 20;
            const ay = (clientY - window.innerHeight / 2) / 20;
            targetX = ax;
            targetY = ay;
        }

        window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                handleMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        });

        function update3DRotation() {
            currentX += (targetX - currentX) * 0.1;
            currentY += (targetY - currentY) * 0.1;
            scene3D.style.transform = `rotateY(${currentX}deg) rotateX(${currentY}deg)`;
            requestAnimationFrame(update3DRotation);
        }
        update3DRotation();

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            timer.style.display = 'block';
            
            let count = 3;
            timer.innerText = count;
            
            let countdownInterval = setInterval(() => {
                count--;
                if(count > 0) {
                    timer.innerText = count;
                } else {
                    clearInterval(countdownInterval);
                    timer.style.display = 'none';
                    showHeadline();
                }
            }, 1000);
        });

        function showHeadline() {
            headline.style.display = 'block';
            setTimeout(() => {
                headline.style.opacity = '0';
                setTimeout(() => {
                    headline.style.display = 'none';
                    initApp();
                }, 1500);
            }, 3000);
        }

        function initApp() {
            running = true;
            closeBtn.style.display = 'block';
            
            spawnInterval = setInterval(() => {
                if(Math.random() > 0.45) {
                    createPhotoBubble();
                } else {
                    createMessageBubble();
                }
            }, 1000);
            
            setInterval(() => {
                if(fireworks.length < 4) {
                    createFirework(Math.random() * canvas.width, canvas.height, Math.random() * canvas.width, Math.random() * (canvas.height * 0.5));
                }
            }, 900);
        }

        closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            clearInterval(spawnInterval);
            msgContainer.innerHTML = '';
            closeBtn.style.display = 'none';
            uiLayer.style.pointerEvents = 'none';
        });

        window.addEventListener('click', (e) => {
            if(!running) return;
            if(e.target.id === 'startBtn' || e.target.id === 'closeBtn') return;
            createFirework(e.clientX, canvas.height, e.clientX, e.clientY);
        });

        function createMessageBubble() {
            if(!running) return;
            const bubble = document.createElement('div');
            bubble.classList.add('msg-bubble');
            bubble.innerText = ucapanList[Math.floor(Math.random() * ucapanList.length)];
            
            const randomX = Math.random() * 70; 
            const randomZ = Math.floor(Math.random() * 160) - 80;
            const randomDuration = Math.random() * 5 + 10;
            
            bubble.style.left = randomX + '%';
            bubble.style.transform = `translateZ(${randomZ}px)`;
            bubble.style.animationDuration = randomDuration + 's';
            
            msgContainer.appendChild(bubble);
            setTimeout(() => bubble.remove(), randomDuration * 1000);
        }

        function createPhotoBubble() {
            if(!running) return;
            const img = document.createElement('img');
            img.classList.add('photo-bubble');
            
            // Pilih indeks foto acak (0-6)
            const fotoIndex = Math.floor(Math.random() * 7);
            const namaFoto = `FOTO ${fotoIndex + 1}`;

            // --- TRIK PEMULIHAN PINTAR ---
            // Mencoba memuat file dengan ekstensi asli (.jpg dan .jpeg)
            img.src = `${encodeURIComponent(namaFoto)}.jpg`;
            img.onerror = function() {
                this.onerror = null; // Mencegah loop onerror
                this.src = `${encodeURIComponent(namaFoto)}.jpeg`; // Coba .jpeg jika .jpg gagal
            };
            
            const randomX = Math.random() * 75; 
            const randomZ = Math.floor(Math.random() * 160) - 80;
            const randomDuration = Math.random() * 5 + 10;
            
            img.style.left = randomX + '%';
            img.style.transform = `translateZ(${randomZ}px)`;
            img.style.animationDuration = randomDuration + 's';
            
            msgContainer.appendChild(img);
            setTimeout(() => img.remove(), randomDuration * 1000);
        }

        function createFirework(sx, sy, tx, ty) {
            fireworks.push({
                x: sx, y: sy, sx: sx, sy: sy, tx: tx, ty: ty,
                distanceToTarget: calculateDistance(sx, sy, tx, ty),
                distanceTraveled: 0,
                coordinates: [[sx, sy], [sx, sy], [sx, sy]],
                angle: Math.atan2(ty - sy, tx - sx),
                speed: 3, acceleration: 1.05,
                brightness: Math.floor(Math.random() * 21) + 50,
                hue: Math.floor(Math.random() * 360)
            });
        }

        function createParticles(x, y, hue) {
            let count = 70;
            while(count--) {
                particles.push({
                    x: x, y: y,
                    coordinates: [[x,y], [x,y], [x,y], [x,y], [x,y]],
                    angle: Math.random() * Math.PI * 2,
                    speed: Math.random() * 7 + 1,
                    friction: 0.95, gravity: 1.1,
                    hue: hue + Math.floor(Math.random() * 50 - 25),
                    brightness: Math.floor(Math.random() * 21) + 50,
                    alpha: 1, decay: Math.random() * 0.015 + 0.015
                });
            }
        }

        function calculateDistance(pt1X, pt1Y, pt2X, pt2Y) {
            return Math.sqrt(Math.pow(pt1X - pt2X, 2) + Math.pow(pt1Y - pt2Y, 2));
        }

        function animLoop() {
            requestAnimationFrame(animLoop);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(5, 1, 10, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'lighter';
            
            let fIndex = fireworks.length;
            while(fIndex--) {
                let f = fireworks[fIndex];
                f.coordinates.pop();
                f.coordinates.unshift([f.x, f.y]);
                f.speed *= f.acceleration;
                let vx = Math.cos(f.angle) * f.speed;
                let vy = Math.sin(f.angle) * f.speed;
                f.distanceTraveled = calculateDistance(f.sx, f.sy, f.x + vx, f.y + vy);
                
                if(f.distanceTraveled >= f.distanceToTarget) {
                    createParticles(f.tx, f.ty, f.hue);
                    fireworks.splice(fIndex, 1);
                } else {
                    f.x += vx; f.y += vy;
                    ctx.beginPath();
                    ctx.moveTo(f.coordinates[f.coordinates.length - 1][0], f.coordinates[f.coordinates.length - 1][1]);
                    ctx.lineTo(f.x, f.y);
                    ctx.strokeStyle = `hsl(${f.hue}, 100%, ${f.brightness}%)`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
            
            let pIndex = particles.length;
            while(pIndex--) {
                let p = particles[pIndex];
                p.coordinates.pop();
                p.coordinates.unshift([p.x, p.y]);
                p.speed *= p.friction;
                p.x += Math.cos(p.angle) * p.speed;
                p.y += Math.sin(p.angle) * p.speed + p.gravity;
                p.alpha -= p.decay;
                
                if(p.alpha <= p.decay) {
                    particles.splice(pIndex, 1);
                } else {
                    ctx.beginPath();
                    ctx.moveTo(p.coordinates[p.coordinates.length - 1][0], p.coordinates[p.coordinates.length - 1][1]);
                    ctx.lineTo(p.x, p.y);
                    ctx.strokeStyle = `hsla(${p.hue}, 100%, ${p.brightness}%, ${p.alpha})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
        }
        requestAnimationFrame(animLoop);
    </script>
</body>
</html>
